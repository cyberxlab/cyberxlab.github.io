{{ define "main" }}
<article class="article-list">
  <h1>{{ .Title }}</h1>
  <div class="article-list__items">
    {{ range .Pages }}
    <div class="article-list__item">
      <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
      {{ if .Summary }}
      <div class="article-list__summary">{{ .Summary | safeHTML }}</div>
      {{ end }}
      <a href="{{ .RelPermalink }}" class="article-list__more">阅读全文 →</a>
    </div>
    {{ end }}
  </div>
</article>
{{ end }}
