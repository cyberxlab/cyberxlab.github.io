# Configuration
baseURL: "https://cyberxlab.3344198.xyz/"
title: "Cyber·X·Lab"

enableRobotsTXT: true
# Parse Git commit
enableGitInfo: true
# enableEmoji: false
hasCJKLanguage: true

# services:
#   googleAnalytics:
#     ID: G-MEASUREMENT_ID

outputs:
  home: [html, llms]
  page: [html, markdown]
  section: [html, rss, markdown]

defaultContentLanguage: en
languages:
  en:
    label: English
    weight: 1
    title: Cyber·X·Lab
  zh-cn:
    label: 简体中文
    locale: zh-CN
    weight: 2
    title: Cyber·X·Lab
    params:
      banner:
        message: |
          🎉 Cyber·X·Lab 正式上线！查看[公告]({{% relref "blog/cyberxlab-launch" %}})
      page:
        contextMenu:
          links:
            - name: 在 ChatGPT 中打开
              icon: chatgpt
              url: "https://chatgpt.com/?hints=search&q=%E6%88%91%E6%AD%A3%E5%9C%A8%E9%98%85%E8%AF%BB%E8%BF%99%E4%B8%AA%E6%96%87%E6%A1%A3%3A+{url}%0A%E5%B8%AE%E6%88%91%E7%90%86%E8%A7%A3%E5%A6%82%E4%BD%95%E4%BD%BF%E7%94%A8%E5%AE%83%E3%80%82"

module:
  hugoVersion:
    extended: true
    min: "0.146.0"

  # workspace: hugo.work
  imports:
    - path: github.com/imfing/hextra

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block: [['\[', '\]'], ['$$', '$$']]
          inline: [['\(', '\)']]
        enable: true

enableInlineShortcodes: true

menu:
  main:
    - identifier: showcase
      name: Showcase
      pageRef: /articles
      weight: 1
      params:
        type: link
    - identifier: blog
      name: Blog
      pageRef: /blog
      weight: 2
    - identifier: x-twitter
      name: X (Twitter)
      url: https://x.com/CyberXLab
      parent: community
      weight: 1
    - identifier: youtube
      name: YouTube
      url: https://www.youtube.com/@cyberxlab-xyz
      parent: community
      weight: 2
    - identifier: discord
      name: Discord
      url: https://discord.gg/gZd3QZrwRe
      parent: community
      weight: 3
    - identifier: telegram
      name: Telegram
      url: https://t.me/cyberxlab_community
      parent: community
      weight: 4
    - identifier: wechat
      name: WeChat
      pageRef: /wechat
      parent: community
      weight: 5
    - identifier: community
      name: Community
      weight: 3
    - identifier: more
      name: More
      weight: 4
    - identifier: documentation
      name: Documentation
      pageRef: /docs
      parent: more
      weight: 1
    - identifier: glossary
      name: Glossary
      pageRef: /glossary
      parent: more
      weight: 2
    - name: Search
      weight: 8
      params:
        type: search
    - name: GitHub
      weight: 9
      url: "https://github.com/cyberxlab"
      params:
        icon: github

  sidebar:
    - identifier: about
      name: "About"
      pageRef: "/about"
      weight: 1

params:
  description: Modern, responsive, batteries-included Hugo theme for creating beautiful static websites.

  externalLinkDecoration: true

  banner:
    key: 'announcement-cyberxlab-launch'
    message: |
      🎉 Cyber·X·Lab is now live! Read the [announcement]({{% relref "blog/cyberxlab-launch" %}})

  navbar:
    displayTitle: true
    displayLogo: true
    logo:
      path: images/logo.png
      dark: images/logo-dark.png
      width: 36
      height: 36
      # link: /
    width: wide

  theme:
    # light | dark | system
    default: system
    displayToggle: true

  footer:
    displayPoweredBy: true
    displayCopyright: true
    width: normal

  icons:
    remote:
      enable: true

  # Display the last modification date
  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Display the author name of the last modified date
  displayUpdatedAuthor: false

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: content
      # full | forward | reverse | strict
      # https://github.com/nextapps-de/flexsearch/#tokenizer-prefix-search
      tokenize: forward

  editURL:
    enable: false
    base: "https://github.com/cyberxlab/cyberxlab.github.io/edit/main/content"

  blog:
    list:
      displayTags: true
      # date | lastmod | publishDate | title | weight
      sortBy: date
      sortOrder: desc # or "asc"
      # Pagination
      pagerSize: 20

    article:
      displayPagination: true

  archives:
    # Source section used for the archives page.
    section: blog
    # Date format for archive list items.
    dateFormat: "Jan 02"

  toc:
    displayTags: true

  highlight:
    copy:
      enable: true
      # hover | always
      display: hover

  page:
    # full (100%), wide (90rem), normal (80rem)
    width: normal
    # tabs:
    #   sync: true
    contextMenu:
      enable: true
      links:
        - name: Open in ChatGPT
          icon: chatgpt
          url: "https://chatgpt.com/?hints=search&q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."
        - name: Open in Claude
          icon: claude
          url: "https://claude.ai/new?q=I%27m+looking+at+this+documentation%3A+{url}%0AHelp+me+understand+how+to+use+it."

  imageZoom:
    enable: true

  comments:
    enable: false
    type: giscus

    # https://giscus.app/
    giscus:
      repo: imfing/hextra
      repoId: R_kgDOJ9fJag
      category: General
      categoryId: DIC_kwDOJ9fJas4CY7gW
      # mapping: pathname
      # strict: 0
      # reactionsEnabled: 1
      # emitMetadata: 0
      # inputPosition: top
      # lang: en
      # theme: noborder_dark
