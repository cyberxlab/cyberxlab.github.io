<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <style>
    .line { fill: none; stroke: #f5f5f5; stroke-linecap: round; stroke-linejoin: round; }
    .accent { fill: none; stroke: #ff9a2e; stroke-linecap: round; stroke-linejoin: round; }
    .fill-line { fill: #f5f5f5; }
    .fill-accent { fill: #ff9a2e; }
  </style>

  <!-- Outer ring -->
  <circle cx="500" cy="500" r="460" class="line" stroke-width="18"/>

  <!-- Orange gauge arc (upper-right) -->
  <path d="M 870 430 A 380 380 0 0 0 570 130" class="accent" stroke-width="10"/>
  <!-- Orange gauge arc (lower-left) -->
  <path d="M 130 570 A 380 380 0 0 0 430 870" class="accent" stroke-width="10"/>

  <!-- Tick marks (upper-right) -->
  <g class="line" stroke-width="6">
    <line x1="600" y1="155" x2="606" y2="175"/>
    <line x1="660" y1="125" x2="664" y2="146"/>
    <line x1="720" y1="115" x2="721" y2="136"/>
    <line x1="780" y1="120" x2="779" y2="141"/>
    <line x1="835" y1="142" x2="831" y2="163"/>
  </g>

  <!-- Atom orbit -->
  <ellipse cx="500" cy="500" rx="300" ry="90" class="line" stroke-width="10"/>
  <circle cx="755" cy="475" r="22" class="fill-line"/>
  <circle cx="245" cy="525" r="22" class="fill-line"/>

  <!-- Central X cross -->
  <path d="M 290 290 L 710 710 M 710 290 L 290 710" class="line" stroke-width="80" stroke-linecap="square"/>

  <!-- Test tube outline -->
  <path d="M 462 270 L 462 290 L 468 290 L 468 690 A 32 32 0 0 0 532 690 L 532 290 L 538 290 L 538 270 Z" class="line" stroke-width="10" fill="none"/>
  <!-- Orange liquid -->
  <path d="M 468 510 L 468 690 A 32 32 0 0 0 532 690 L 532 510 Z" class="fill-accent"/>
  <!-- Tube markings -->
  <line x1="486" y1="360" x2="514" y2="360" class="accent" stroke-width="7"/>
  <line x1="486" y1="395" x2="514" y2="395" class="accent" stroke-width="7"/>
  <circle cx="500" cy="435" r="8" class="fill-accent"/>
</svg>
