<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <style>
    :root {
      --bg-circle: transparent;
      --chip-main: #ffffff;
      --chip-cyan: #22d3ee;
      --chip-accent: #f87171;
      --chip-inner: #111827;
    }
  </style>

  <circle cx="500" cy="500" r="450" fill="var(--bg-circle)" />

  <rect x="270" y="270" width="460" height="460" rx="60" fill="var(--chip-main)" />
  <rect x="340" y="190" width="60" height="80" fill="var(--chip-main)" />
  <rect x="480" y="190" width="60" height="80" fill="var(--chip-main)" />
  <rect x="620" y="190" width="60" height="80" fill="var(--chip-main)" />
  <rect x="340" y="730" width="60" height="80" fill="var(--chip-main)" />
  <rect x="480" y="730" width="60" height="80" fill="var(--chip-main)" />
  <rect x="620" y="730" width="60" height="80" fill="var(--chip-main)" />
  <rect x="190" y="340" width="80" height="60" fill="var(--chip-main)" />
  <rect x="190" y="480" width="80" height="60" fill="var(--chip-main)" />
  <rect x="190" y="620" width="80" height="60" fill="var(--chip-main)" />
  <rect x="730" y="340" width="80" height="60" fill="var(--chip-main)" />
  <rect x="730" y="480" width="80" height="60" fill="var(--chip-main)" />
  <rect x="730" y="620" width="80" height="60" fill="var(--chip-main)" />

  <rect x="330" y="330" width="340" height="340" rx="40" fill="var(--chip-inner)" />

  <rect x="480" y="190" width="60" height="80" fill="var(--chip-cyan)" />
  <rect x="190" y="480" width="80" height="60" fill="var(--chip-cyan)" />
  <rect x="730" y="340" width="80" height="60" fill="var(--chip-cyan)" />
  <rect x="730" y="480" width="80" height="60" fill="var(--chip-cyan)" />
  <rect x="480" y="730" width="60" height="80" fill="var(--chip-cyan)" />

  <circle cx="370" cy="210" r="20" fill="var(--chip-accent)" />
  <circle cx="650" cy="210" r="20" fill="var(--chip-accent)" />
  <circle cx="790" cy="650" r="20" fill="var(--chip-accent)" />
  <circle cx="650" cy="790" r="20" fill="var(--chip-accent)" />

  <g stroke-width="70" stroke-linecap="square" fill="none">
    <line x1="620" y1="380" x2="380" y2="620" stroke="var(--chip-main)" />
    <line x1="380" y1="380" x2="500" y2="500" stroke="var(--chip-main)" />
    <line x1="500" y1="500" x2="620" y2="620" stroke="var(--chip-cyan)" />
  </g>
</svg>
