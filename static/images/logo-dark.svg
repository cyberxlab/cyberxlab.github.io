<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg" class="logo-full dark">
  <style>
    .logo-full {
      --line-color: #f5f5f5;
      --accent-color: #ff9a2e;
      --text-color: var(--line-color);
    }
    .stroke-base {
      fill: none;
      stroke: var(--line-color);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .stroke-accent {
      fill: none;
      stroke: var(--accent-color);
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .fill-base {
      fill: var(--line-color);
    }
    .fill-accent {
      fill: var(--accent-color);
    }
    .formula {
      fill: var(--text-color);
      font-family: "Times New Roman", Times, serif;
      font-size: 22px;
      font-weight: 400;
    }
    .sup {
      font-size: 14px;
      baseline-shift: super;
    }
  </style>

  <!-- 背景透明 -->
  <rect width="1000" height="1000" fill="none"/>

  <!-- 1. 外圆环 -->
  <circle cx="500" cy="500" r="420" class="stroke-base" stroke-width="12"/>

  <!-- 2. 内圈橙色弧段 -->
  <path d="M 862 436 A 370 370 0 0 0 564 138" class="stroke-accent" stroke-width="6"/>
  <path d="M 138 564 A 370 370 0 0 0 436 862" class="stroke-accent" stroke-width="6"/>

  <!-- 3. 内圈刻度（右上弧段） -->
  <g class="stroke-base" stroke-width="2">
    <line x1="575" y1="155" x2="579" y2="170"/>
    <line x1="603" y1="140" x2="608" y2="158"/>
    <line x1="635" y1="129" x2="638" y2="148"/>
    <line x1="668" y1="122" x2="670" y2="142"/>
    <line x1="702" y1="120" x2="703" y2="140"/>
    <line x1="735" y1="123" x2="735" y2="143"/>
    <line x1="768" y1="131" x2="767" y2="151"/>
    <line x1="799" y1="144" x2="797" y2="164"/>
    <line x1="828" y1="161" x2="825" y2="181"/>
    <line x1="853" y1="183" x2="849" y2="202"/>
  </g>

  <!-- 4. DNA双螺旋（左上段） -->
  <g class="stroke-base" stroke-width="4">
    <path d="M 220 285 Q 260 240 310 215 Q 360 195 410 190" />
    <path d="M 205 330 Q 250 285 300 260 Q 350 240 400 232" />
    <line x1="228" y1="276" x2="215" y2="318"/>
    <line x1="276" y1="236" x2="260" y2="279"/>
    <line x1="330" y1="212" x2="312" y2="255"/>
    <line x1="384" y1="200" x2="366" y2="242"/>
  </g>

  <!-- 5. DNA双螺旋（右下段） -->
  <g class="stroke-base" stroke-width="4">
    <path d="M 780 715 Q 740 760 690 785 Q 640 805 590 810" />
    <path d="M 795 670 Q 750 715 700 740 Q 650 760 600 768" />
    <line x1="772" y1="724" x2="785" y2="682"/>
    <line x1="724" y1="764" x2="740" y2="721"/>
    <line x1="670" y1="788" x2="688" y2="745"/>
    <line x1="616" y1="800" x2="634" y2="758"/>
  </g>

  <!-- 6. 原子轨道 + 电子 -->
  <ellipse cx="500" cy="500" rx="285" ry="75" class="stroke-base" stroke-width="5"/>
  <circle cx="745" cy="465" r="12" class="fill-base"/>
  <circle cx="255" cy="535" r="12" class="fill-base"/>

  <!-- 7. 中心X主体 -->
  <path d="M 280 280 L 720 720 M 720 280 L 280 720" class="stroke-base" stroke-width="52" stroke-linecap="square"/>

  <!-- 8. 试管 -->
  <path d="M 465 270 L 465 285 L 470 285 L 470 680 A 30 30 0 0 0 530 680 L 530 285 L 535 285 L 535 270 Z" class="stroke-base" stroke-width="4" fill="#ffffff" fill-opacity="0"/>
  <path d="M 470 510 L 470 680 A 30 30 0 0 0 530 680 L 530 510 Z" class="fill-accent"/>
  <line x1="490" y1="355" x2="510" y2="355" class="stroke-accent" stroke-width="3"/>
  <line x1="490" y1="380" x2="510" y2="380" class="stroke-accent" stroke-width="3"/>
  <circle cx="500" cy="405" r="3" class="fill-accent"/>

  <!-- 9. 数理公式 -->
  <text x="235" y="345" class="formula">
    e<tspan class="sup">iπ</tspan> + 1 = 0
  </text>
  <text x="705" y="660" class="formula">
    E = mc<tspan class="sup">2</tspan>
  </text>
</svg>
