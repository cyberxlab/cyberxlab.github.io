<svg viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
  <style>
    .no-fill { fill: none; }
    .stroke-primary { stroke: #1a1a1a; stroke-linecap: butt; }
    .stroke-secondary { stroke: #333333; stroke-linecap: butt; }
    .stroke-accent { stroke: #ff7a00; stroke-linecap: butt; }
    .fill-primary { fill: #1a1a1a; }
    .fill-secondary { fill: #333333; }
    .fill-accent { fill: #ff7a00; }
  </style>

  <!-- 1. 原子轨道（最底层） -->
  <g class="stroke-secondary no-fill" stroke-width="8">
    <ellipse cx="500" cy="500" rx="220" ry="90" transform="rotate(-30 500 500)"/>
    <ellipse cx="500" cy="500" rx="220" ry="90" transform="rotate(30 500 500)"/>
    <circle cx="310" cy="495" r="12" class="fill-secondary" stroke="none"/>
    <circle cx="690" cy="495" r="12" class="fill-secondary" stroke="none"/>
  </g>

  <!-- 2. 中心 X 符号 -->
  <path d="M300 300 L360 300 L500 460 L640 300 L700 300 L540 500 L700 700 L640 700 L500 540 L360 700 L300 700 L460 500 Z"
        class="fill-primary" stroke="none"/>

  <!-- 3. 试管 -->
  <g>
    <path d="M464 550 L536 550 L536 700 A 36 36 0 0 1 464 700 Z"
          class="fill-accent" stroke="none"/>
    <path d="M450 280 L550 280 L550 300 L540 300 L540 700 A 40 40 0 0 1 460 700 L460 300 L450 300 Z"
          class="no-fill stroke-primary" stroke-width="8" stroke-linejoin="round"/>
    <line x1="480" y1="370" x2="510" y2="370" class="stroke-primary" stroke-width="6" stroke-linecap="round"/>
    <line x1="480" y1="400" x2="510" y2="400" class="stroke-primary" stroke-width="6" stroke-linecap="round"/>
    <circle cx="495" cy="430" r="4" class="fill-primary" stroke="none"/>
  </g>

  <!-- 4. 外圈双环（最上层） -->
  <g stroke-width="20" class="no-fill">
    <path d="M893.92 569.47 A 400 400 0 0 1 430.56 893.92" class="stroke-primary"/>
    <path d="M106.08 430.56 A 400 400 0 0 1 569.44 106.08" class="stroke-primary"/>
    <path d="M700 153.6 A 400 400 0 0 1 893.92 430.53" class="stroke-accent"/>
    <path d="M300 846.4 A 400 400 0 0 1 106.08 569.47" class="stroke-accent"/>
  </g>

  <g stroke-width="16" class="no-fill">
    <path d="M844.68 560.79 A 350 350 0 0 1 439.24 844.68" class="stroke-secondary"/>
    <path d="M155.32 439.24 A 350 350 0 0 1 560.76 155.32" class="stroke-secondary"/>
    <path d="M675 196.89 A 350 350 0 0 1 844.68 439.21" class="stroke-accent"/>
    <path d="M325 803.11 A 350 350 0 0 1 155.32 560.79" class="stroke-accent"/>
  </g>
</svg>
